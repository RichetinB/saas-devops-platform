version: '3.9'

# Development override – hot-reload for API and Web
# Usage: docker compose -f infra/docker-compose.yml -f infra/docker-compose.dev.yml up

services:
  postgres:
    image: postgres:16-alpine
    container_name: saas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: saas_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: saas_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
      target: development
    container_name: saas_api_dev
    command: sh -c "cd apps/api; npx prisma migrate deploy; cd /app; npm run dev --workspace=apps/api"
    volumes:
      - ../apps/api/src:/app/apps/api/src
      - ../packages:/app/packages
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/saas_db?schema=public
      JWT_SECRET: dev-secret-change-me
      PORT: 3001
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '3001:3001'
      - '9229:9229'  # Node.js debugger

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      target: development
    container_name: saas_web_dev
    command: npm run dev --workspace=apps/web
    volumes:
      - ../apps/web/src:/app/apps/web/src
      - ../packages:/app/packages
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NODE_ENV: development
    ports:
      - '3000:3000'

volumes:
  postgres_data:
  redis_data:
