name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: saas_test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - name: Lint API
        run: npm run lint --workspace=apps/api
        continue-on-error: true

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/saas_test_db?schema=public

      - name: Run API unit tests
        run: npm test --workspace=apps/api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/saas_test_db?schema=public
          JWT_SECRET: test-secret

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/saas_db?schema=public
          NEXT_PUBLIC_API_URL: http://localhost:3001

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose -f infra/docker-compose.yml build
