name: CD – Production

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event.workflow_run.conclusion == 'success'

    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose -f infra/docker-compose.yml build

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Push Docker images to registry
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          docker tag saas-devops-platform-api ${{ vars.REGISTRY_URL }}/saas-api:${IMAGE_TAG}
          docker tag saas-devops-platform-api ${{ vars.REGISTRY_URL }}/saas-api:latest
          docker tag saas-devops-platform-web ${{ vars.REGISTRY_URL }}/saas-web:${IMAGE_TAG}
          docker tag saas-devops-platform-web ${{ vars.REGISTRY_URL }}/saas-web:latest
          docker push ${{ vars.REGISTRY_URL }}/saas-api:${IMAGE_TAG}
          docker push ${{ vars.REGISTRY_URL }}/saas-api:latest
          docker push ${{ vars.REGISTRY_URL }}/saas-web:${IMAGE_TAG}
          docker push ${{ vars.REGISTRY_URL }}/saas-web:latest

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_SSH_HOST }}
          username: ${{ secrets.PRODUCTION_SSH_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            cd /opt/saas-devops-platform
            IMAGE_TAG=${{ github.event.workflow_run.head_sha }}
            docker pull ${{ vars.REGISTRY_URL }}/saas-api:${IMAGE_TAG}
            docker pull ${{ vars.REGISTRY_URL }}/saas-web:${IMAGE_TAG}
            IMAGE_TAG=${IMAGE_TAG} docker compose -f infra/docker-compose.yml up -d --remove-orphans

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_SSH_HOST }}
          username: ${{ secrets.PRODUCTION_SSH_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            echo "Running post-deploy health checks..."
            curl --silent --fail --retry 5 --retry-delay 5 ${{ vars.PRODUCTION_URL }}/health || exit 1
            echo "Health check passed."
