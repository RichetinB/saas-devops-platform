name: CD Staging

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build images
        run: |
          docker build -t ghcr.io/${{ github.repository }}/api:${{ env.IMAGE_TAG }} -f apps/api/Dockerfile .
          docker build -t ghcr.io/${{ github.repository }}/web:${{ env.IMAGE_TAG }} -f apps/web/Dockerfile .

      - name: Push images
        run: |
          docker push ghcr.io/${{ github.repository }}/api:${{ env.IMAGE_TAG }}
          docker push ghcr.io/${{ github.repository }}/web:${{ env.IMAGE_TAG }}